name: CI Pipeline

on:
  push:
    branches: [ master, main ] # ירוץ בכל פעם שדוחפים קוד

jobs:
  build-and-test:
    runs-on: ubuntu-latest # השרת שעליו הכל ירוץ

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # מושך את הקוד מה-Git

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test

    - name: Build Docker Image
      run: docker build -t my-app-image .
